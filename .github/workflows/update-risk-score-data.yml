name: Refresh SOX/Asset Risk Score Source Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-source-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate source data
        run: python3 scripts/update_risk_score_data.py
      - name: Verify source dashboard
        run: |
          python3 -m unittest discover -s tests
          npm test
      - name: Commit generated source data
        run: |
          echo "Source-only workflow: public /quant-dashboard/risk-score/ is served from the quant-dashboard repo."
          echo "After this source refresh, run scripts/sync_to_quant_dashboard.py locally or from a dedicated quant-dashboard deploy workflow before publishing."
          if git diff --quiet; then
            echo "No changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/risk-score
            git commit -m "Refresh SOX and asset risk-score source data" \
              -m "Constraint: FRED public CSV plus no-key Yahoo/manual price adapters; no API secrets." \
              -m "Directive: Sync generated SOX and asset files into quant-dashboard/risk-score before public Pages deployment." \
              -m "Confidence: high" \
              -m "Scope-risk: narrow" \
              -m "Tested: python3 -m unittest discover -s tests; npm test"
            git push
          fi
